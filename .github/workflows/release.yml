"name": "Release"

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing stable tag to publish (for example: v1.2.3)"
        required: true
        type: "string"

concurrency:
  # Keep only one stable release publication active for the same ref at a time.
  #
  # Tag-triggered runs naturally serialize by tag ref. Manual dispatches are
  # still grouped by the selected workflow ref, which is good enough for the
  # recovery-oriented manual path.
  group: "release-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  verify:
    name: "verify"
    runs-on: "ubuntu-latest"
    outputs:
      release_tag: "${{ steps.meta.outputs.release_tag }}"
      release_sha: "${{ steps.meta.outputs.release_sha }}"

    permissions:
      contents: "read"

    steps:
      - name: "Checkout stable tag source"
        uses: "actions/checkout@v6"
        with:
          # Stable releases are published from an existing SemVer tag, not from
          # branch pushes. For manual dispatches, the caller must provide the
          # tag explicitly.
          ref: "${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          fetch-depth: 0

      - name: "Resolve and validate stable release tag"
        id: meta
        shell: "bash"
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "stable releases require a SemVer tag in the form vX.Y.Z; got ${release_tag}" >&2
            exit 1
          fi

          git fetch origin main --force

          release_sha="$(git rev-list -n 1 "${release_tag}")"
          if ! git merge-base --is-ancestor "${release_sha}" "origin/main"; then
            echo "stable release tag ${release_tag} does not point to a commit reachable from origin/main" >&2
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_sha=${release_sha}" >> "$GITHUB_OUTPUT"

      - name: "Setup Go"
        uses: "actions/setup-go@v6"
        with:
          go-version-file: "go.mod"
          cache: true

      - name: "Display Go version"
        run: go version

      - name: "Run unit tests"
        run: go test ./...

      - name: "Run race detector"
        run: go test -race ./...

      - name: "Run go vet"
        run: go vet ./...

  release:
    name: "release"
    runs-on: "ubuntu-latest"
    needs:
      - "verify"

    permissions:
      contents: "write"

    environment:
      name: "release"

    steps:
      - name: "Publish GitHub release from stable tag"
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          RELEASE_TAG: "${{ needs.verify.outputs.release_tag }}"
        shell: "bash"
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release for ${RELEASE_TAG} already exists; leaving it unchanged."
            exit 0
          fi

          gh release create "${RELEASE_TAG}" \
            --verify-tag \
            --generate-notes \
            --title "${RELEASE_TAG}"

      - name: "Publish workflow summary"
        shell: "bash"
        run: |
          {
            echo "# Release Summary"
            echo
            echo "- Stable tag: \`${{ needs.verify.outputs.release_tag }}\`"
            echo "- Source commit: \`${{ needs.verify.outputs.release_sha }}\`"
            echo "- Policy: stable releases must point to a commit reachable from \`main\`"
            echo "- Result: GitHub release published or already present"
          } >> "$GITHUB_STEP_SUMMARY"
