"name": "Attest"

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing stable tag to attest (for example: v1.2.3)"
        required: true
        type: "string"

permissions:
  # Read repository contents to build the release bundle from the tagged source.
  contents: "read"

concurrency:
  # Only one attestation workflow should run per stable tag at a time.
  group: "attest-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  attest-source-bundle:
    name: "attest-source-bundle"
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    permissions:
      contents: "read"
      id-token: "write"
      attestations: "write"
      artifact-metadata: "write"

    steps:
      - name: "Checkout tagged source"
        # actions/checkout v6
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"
        with:
          # Attest only stable tags. Manual dispatches must supply the exact tag.
          ref: "${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          fetch-depth: 0
          persist-credentials: false

      - name: "Resolve release metadata"
        id: meta
        shell: "bash"
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "stable attestations require a SemVer tag in the form vX.Y.Z; got ${tag}" >&2
            exit 1
          fi

          git fetch origin main --force

          release_sha="$(git rev-list -n 1 "${tag}")"
          if ! git merge-base --is-ancestor "${release_sha}" "origin/main"; then
            echo "stable attestation tag ${tag} does not point to a commit reachable from origin/main" >&2
            exit 1
          fi

          artifact_dir="dist"
          artifact_name="arcoris-pool-${tag}-source.tar.gz"
          checksum_name="${artifact_name}.sha256"

          mkdir -p "${artifact_dir}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_sha=${release_sha}" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=${artifact_dir}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"
          echo "checksum_name=${checksum_name}" >> "$GITHUB_OUTPUT"

      - name: "Build canonical source bundle"
        shell: "bash"
        run: |
          set -euo pipefail

          artifact_dir="${{ steps.meta.outputs.artifact_dir }}"
          artifact_name="${{ steps.meta.outputs.artifact_name }}"
          checksum_name="${{ steps.meta.outputs.checksum_name }}"
          tag="${{ steps.meta.outputs.tag }}"

          git archive \
            --format=tar.gz \
            --prefix="arcoris-pool/" \
            -o "${artifact_dir}/${artifact_name}" \
            "${tag}"

          sha256sum "${artifact_dir}/${artifact_name}" | tee "${artifact_dir}/${checksum_name}"

      - name: "Upload source bundle artifact"
        # actions/upload-artifact v7
        uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a"
        with:
          name: "source-bundle-${{ steps.meta.outputs.tag }}"
          path: |
            ${{ steps.meta.outputs.artifact_dir }}/${{ steps.meta.outputs.artifact_name }}
            ${{ steps.meta.outputs.artifact_dir }}/${{ steps.meta.outputs.checksum_name }}
          if-no-files-found: "error"
          retention-days: 30

      - name: "Generate provenance attestation"
        # actions/attest v4
        uses: "actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26"
        with:
          subject-path: "${{ steps.meta.outputs.artifact_dir }}/${{ steps.meta.outputs.artifact_name }}"

      - name: "Publish workflow summary"
        shell: "bash"
        run: |
          {
            echo "# Attestation Summary"
            echo
            echo "- Stable tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- Source commit: \`${{ steps.meta.outputs.release_sha }}\`"
            echo "- Subject: \`${{ steps.meta.outputs.artifact_name }}\`"
            echo "- Checksum file: \`${{ steps.meta.outputs.checksum_name }}\`"
            echo "- Policy: stable attestations must point to a commit reachable from \`main\`"
            echo "- Result: provenance attestation created"
          } >> "$GITHUB_STEP_SUMMARY"
