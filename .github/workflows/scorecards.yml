"name": "Scorecards"

"on":
  push:
    branches:
      - "main"
  workflow_dispatch:
  branch_protection_rule:
  schedule:
    # Weekly scheduled scan on the stable branch.
    #
    # Keep a scheduled run even if repository activity is low, so the published
    # Scorecard result is refreshed against newer query logic and newer
    # repository state over time.
    - cron: "0 5 * * 1"

# Important workflow restrictions when `publish_results: true` is enabled:
#
# - do not add top-level `env` or `defaults`
# - do not grant workflow-level write permissions
# - keep privileged permissions scoped to the Scorecards job only
#
# These restrictions come from the official Scorecard Action publishing model.
permissions: "read-all"

concurrency:
  # Keep only one Scorecards run active for the stable branch.
  #
  # This avoids overlapping result publication and reduces unnecessary pressure
  # on the Scorecard API / code scanning upload path.
  group: "scorecards-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  analysis:
    name: "scorecards-analysis"
    runs-on: "ubuntu-latest"

    # No job-level env/defaults here.
    #
    # The official Scorecard publishing path restricts the workflow shape when
    # `publish_results: true` is enabled.
    permissions:
      # Required to publish SARIF to GitHub code scanning.
      security-events: "write"

      # Required by scorecard-action v2 when `publish_results: true` is enabled.
      # The action uses GitHub OIDC to sign and publish trustworthy results.
      id-token: "write"

      # Read permissions recommended by the official action so it can inspect
      # repository state and detect relevant checks reliably.
      contents: "read"
      actions: "read"
      issues: "read"
      pull-requests: "read"
      checks: "read"

    steps:
      # Harden the runner first.
      #
      # This action is explicitly allowed by the official Scorecard publishing
      # restrictions and adds useful visibility into outbound network behavior.
      - name: "Harden runner"
        # step-security/harden-runner v2
        uses: "step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40"
        with:
          egress-policy: "audit"

      - name: "Checkout repository"
        # actions/checkout v6
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"
        with:
          # Full history improves the quality of some repository checks and keeps
          # the action closer to the official examples.
          fetch-depth: 0
          persist-credentials: false

      - name: "Run OpenSSF Scorecard analysis"
        id: scorecard
        # ossf/scorecard-action v2.4.3
        uses: "ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a"
        with:
          # Store results in SARIF so they can be uploaded to GitHub code
          # scanning and shown in the Security tab.
          results_file: "results.sarif"
          results_format: "sarif"

          # Publish results to the public Scorecard API / badge pipeline.
          #
          # This enables:
          # - scorecard.dev / API visibility
          # - repository badge support
          # - more up-to-date published repository score data
          publish_results: true

      - name: "Upload SARIF to GitHub code scanning"
        # github/codeql-action/upload-sarif v4
        uses: "github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225"
        with:
          sarif_file: "results.sarif"

      - name: "Upload Scorecard artifact"
        # actions/upload-artifact v7
        uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a"
        with:
          name: "scorecard-sarif"
          path: "results.sarif"
          retention-days: 7
          if-no-files-found: "error"
