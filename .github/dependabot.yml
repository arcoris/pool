version: 2

updates:
  # Go module dependencies.
  - package-ecosystem: "gomod"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Berlin"

    # Keep review load bounded for a small repository.
    open-pull-requests-limit: 5

    # Keep PR metadata predictable and easy to filter.
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore"
      include: "scope"

    # Group routine module updates together so maintainers are not flooded with
    # many tiny PRs.
    groups:
      go-minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

      go-indirect-minor-and-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

    # Keep noisy major upgrades isolated for deliberate review.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions dependencies used by repository automation.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Europe/Berlin"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"

    groups:
      github-actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
